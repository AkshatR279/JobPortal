# -------------------- COMMON ENV --------------------
x-common-env: &common-env
  DB_URL: jdbc:mysql://mysql:3306/jobportal
  DB_USER: jobportaluser
  DB_PASSWORD: admin

  REDIS_PORT: 6379
  REDIS_CACHE_NAME: jobportal

  EUREKA_URL: http://eureka:8761/eureka/

  KAFKA_SERVERS: kafka:9092


# -------------------- SERVICES --------------------
services:

  # -------------------- DATABASE --------------------
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobportal
      MYSQL_USER: jobportaluser
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - micro-net

  # -------------------- REDIS CACHE --------------------
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - micro-net

  # -------------------- ZOOKEEPER --------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - micro-net

  # -------------------- KAFKA --------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - micro-net

  # -------------------- EUREKA --------------------
  eureka:
    build: ./eurekaServiceDiscovery
    container_name: eureka
    ports:
      - "8761:8761"
    environment:
      EUREKA_PORT: 8761
    restart: always
    networks:
      - micro-net

  # -------------------- JOB PORTAL SERVICE --------------------
  jobportal:
    build: .
    container_name: jobportal
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - kafka
      - eureka
      - redis
    restart: always
    environment:
      JOBPORTAL_PORT: 8080
      JOBPORTAL_VERSION: 1.0.0

      JOBPORTAL_JWT_KEY: 8kl4hCQWgvtaU+eCv5APf2MP9xvgbUvOc7r8ikpBaTI=
      JOBPORTAL_JWT_EXPIRATION: 3600000

      JOBPORTAL_KAFKA_GROUP_ID: jobPortal-group
    networks:
      - micro-net

  # -------------------- MESSAGE SERVICE --------------------
  message-service:
    build: ./messageService
    container_name: message-service
    ports:
      - "8500:8500"
    depends_on:
      - mysql
      - redis
      - kafka
      - eureka
    restart: always
    environment:
      MESSAGESERVICE_PORT: 8500
      MESSAGESERVICE_VERSION: 1.0.0

      MESSAGESERVICE_KAFKA_GROUP_ID: messageService-group

      MESSAGESERVICE_MAIL_HOST: smtp.gmail.com
      MESSAGESERVICE_MAIL_PORT: 587
      MESSAGESERVICE_MAIL_USERNAME: akshatr279.b@gmail.com
      MESSAGESERVICE_MAIL_PASSWORD: ytibeszpzczmsxiz
    networks:
      - micro-net

  # -------------------- ORDER SERVICE --------------------
  order-service:
    build: ./orderService
    container_name: order-service
    ports:
      - "9000:9000"
    depends_on:
      - mysql
      - redis
      - kafka
      - eureka
    restart: always
    environment:
      ORDERSERVICE_PORT: 9000
      ORDERSERVICE_VERSION: 1.0.0

      ORDERSERVICE_KAFKA_GROUP_ID: orderService-group
    networks:
      - micro-net

  # -------------------- PAYMENT SERVICE --------------------
  payment-service:
    build: ./paymentService
    container_name: payment-service
    ports:
      - "9500:9500"
    depends_on:
      - mysql
      - redis
      - kafka
      - eureka
    restart: always
    environment:
      PAYMENTSERVICE_PORT: 9500
      PAYMENTSERVICE_VERSION: 1.0.0

      PAYMENTSERVICE_KAFKA_GROUP_ID: paymentService-group

      PAYMENTSERVICE_RAZORPAY_KEY: rzp_test_SKqgELcccvzc9f
      PAYMENTSERVICE_RAZORPAY_SECRET: wV3xNsPNin5e7u52kQenXHVL
      PAYMENTSERVICE_RAZORPAY_WEBHOOK_SECRET: wV3xNsPNin5e7u52kQenXHVL
    networks:
      - micro-net

  # -------------------- USER SERVICE --------------------
  user-service:
    build: ./userService
    container_name: user-service
    ports:
      - "7500:7500"
    depends_on:
      - mysql
      - kafka
      - eureka
      - redis
    restart: always
    environment:
      USERSERVICE_PORT: 7500
      USERSERVICE_VERSION: 1.0.0

      USERSERVICE_KAFKA_GROUP_ID: userService-group

      USERSERVICE_JWT_KEY: 8kl4hCQWgvtaU+eCv5APf2MP9xvgbUvOc7r8ikpBaTI=
