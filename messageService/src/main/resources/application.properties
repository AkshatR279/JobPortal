spring.application.name=messageService
spring.mvc.servlet.path=/api
server.port=${MESSAGESERVICE_PORT}

#Info
info.app.name=Job Portal - Messaging Service
info.app.description=Messaging Service (Job Application Portal) by Akshat
info.app.version=${MESSAGESERVICE_VERSION}

#Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Actuaor
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.endpoint.shutdown.enabled=true
server.shutdown=graceful

#Email Service
spring.mail.host=${MESSAGESERVICE_MAIL_HOST}
spring.mail.port=${MESSAGESERVICE_MAIL_PORT}
spring.mail.username=${MESSAGESERVICE_MAIL_USERNAME}
spring.mail.password=${MESSAGESERVICE_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#Cache (Redis)
spring.cache.type=redis
spring.data.redis.host=redis
spring.data.redis.port=${REDIS_PORT}
spring.cache.cache-name=${REDIS_CACHE_NAME}

#Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS}
spring.kafka.consumer.group-id=${USERSERVICE_KAFKA_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.listener.missing-topics-fatal=false
logging.level.org.springframework.kafka=DEBUG





