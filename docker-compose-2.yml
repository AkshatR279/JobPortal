# -------------------- COMMON ENV --------------------
x-common-env: &common-env
  #DB_URL: jdbc:mysql://mysql:3306/jobportal
  DB_URL: jdbc:mysql://host.docker.internal:3307/jobportal
  DB_USER: root
  DB_PASSWORD: root

  REDIS_PORT: 6379
  REDIS_CACHE_NAME: jobportal

  EUREKA_URL: http://eureka:8761/eureka/

  KAFKA_SERVERS: kafka:9092


# -------------------- SERVICES --------------------
services:

  # -------------------- DATABASE --------------------
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobportal
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - micro-net

  # -------------------- REDIS CACHE --------------------
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - micro-net

  # -------------------- ZOOKEEPER --------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - micro-net

  # -------------------- KAFKA --------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - micro-net

  # -------------------- EUREKA --------------------
  eureka:
    build: ./eurekaServiceDiscovery
    container_name: eureka
    ports:
      - "8761:8761"
    environment:
      <<: *common-env
      EUREKA_PORT: 8761
    restart: always
    networks:
      - micro-net

  # -------------------- USER SERVICE --------------------
  user-service:
    build: ./userService
    container_name: user-service
    ports:
      - "7500:7500"
    depends_on:
      - mysql
      - kafka
      - eureka
      - redis
    restart: always
    environment:
      <<: *common-env
      USERSERVICE_PORT: 7500
      USERSERVICE_VERSION: 1.0.0

      USERSERVICE_KAFKA_GROUP_ID: userService-group

      USERSERVICE_JWT_KEY: 8kl4hCQWgvtaU+eCv5APf2MP9xvgbUvOc7r8ikpBaTI=
      USERSERVICE_JWT_EXPIRATION: 3600000
    networks:
      - micro-net


# -------------------- NETWORK --------------------
networks:
  micro-net:


# -------------------- VOLUMES --------------------
volumes:
  mysql-data: